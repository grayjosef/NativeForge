name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          pip install -e ".[dev]"
      - name: Ruff
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: Demo isolation SQL gate (nf_* outside repositories)
        run: python scripts/check_nf_sql_grep.py
      - name: Pytest
        run: pytest -q
      - name: Alembic history (smoke)
        run: alembic history

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install, typecheck, and build
        run: |
          npm ci
          npm run typecheck
          npm run build
