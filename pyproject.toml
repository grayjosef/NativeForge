[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.coverage.run]
branch = true
source = ["nativeforge"]
omit = ["*/tests/*"]

[tool.coverage.report]
skip_empty = true
show_missing = true
