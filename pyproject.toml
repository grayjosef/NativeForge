[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "nativeforge"
version = "0.1.0"
description = "NativeForge API — sovereignty-first tribal grant pursuit (application package)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlalchemy>=2.0",
    "alembic>=1.14",
    "psycopg[binary]>=3.2",
    "pydantic-settings>=2.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-cov>=6.0",
    "httpx>=0.27",
    "ruff>=0.8",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
"src/nativeforge/services/opportunity_source_catalog.py" = ["E501"]
"src/nativeforge/services/discovery_evidence_pack_service.py" = ["E501"]
"src/nativeforge/repositories/evidence_pack.py" = ["E501"]
"tests/test_sprint19_evidence_pack.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.coverage.run]
branch = true
source = ["nativeforge"]
omit = ["*/tests/*"]

[tool.coverage.report]
skip_empty = true
show_missing = true
